name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: install
        run: npm ci

      - name: dependency audit
        run: npm audit --audit-level=moderate

      - name: type check
        run: npx astro check